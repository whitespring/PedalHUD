name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          # Build number from run number
          echo "build=${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Import code signing certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$P12_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install App Store Connect API key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo -n "$API_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_${API_KEY_ID}.p8

      - name: Create Local.xcconfig
        run: |
          cat > Config/Local.xcconfig << EOF
          DEVELOPMENT_TEAM = ${{ secrets.APPLE_TEAM_ID }}
          BUNDLE_ID_PREFIX = ${{ secrets.BUNDLE_ID_PREFIX }}
          EOF

      - name: Install provisioning profiles
        env:
          MAIN_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_MAIN_BASE64 }}
          EXT_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_EXT_BASE64 }}
        run: |
          mkdir -p Config/profiles
          echo -n "$MAIN_PROFILE_BASE64" | base64 --decode > Config/profiles/PedalHUD_Developer_ID.provisionprofile
          echo -n "$EXT_PROFILE_BASE64" | base64 --decode > Config/profiles/PedalHUD_Camera_extension_Developer_ID.provisionprofile
          # Also install to system location for xcodebuild
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          MAIN_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i Config/profiles/PedalHUD_Developer_ID.provisionprofile))
          EXT_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i Config/profiles/PedalHUD_Camera_extension_Developer_ID.provisionprofile))
          cp Config/profiles/PedalHUD_Developer_ID.provisionprofile ~/Library/MobileDevice/Provisioning\ Profiles/${MAIN_UUID}.provisionprofile
          cp Config/profiles/PedalHUD_Camera_extension_Developer_ID.provisionprofile ~/Library/MobileDevice/Provisioning\ Profiles/${EXT_UUID}.provisionprofile

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project PedalHUD/PedalHUD.xcodeproj \
            -scheme PedalHUD

      - name: Archive
        env:
          BUNDLE_ID_PREFIX: ${{ secrets.BUNDLE_ID_PREFIX }}
        run: |
          xcodebuild archive \
            -project PedalHUD/PedalHUD.xcodeproj \
            -scheme PedalHUD \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath .build/PedalHUD.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_CONNECT_KEY_ISSUER_ID }} \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.build }}" \
            MACOSX_DEPLOYMENT_TARGET=15.0 \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            BUNDLE_ID_PREFIX="$BUNDLE_ID_PREFIX" \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO

      - name: Sign with Developer ID and package
        id: prepare
        run: |
          APP_PATH=".build/PedalHUD.xcarchive/Products/Applications/PedalHUD.app"
          IDENTITY="Developer ID Application: DCTR Inc. (${{ secrets.APPLE_TEAM_ID }})"
          MAIN_ENTITLEMENTS="Apps/PedalHUDMac/Resources/PedalHUD.entitlements"
          EXT_ENTITLEMENTS="Apps/PedalHUDCameraExtension/Resources/PedalHUDCameraExtension.entitlements"

          # Remove development provisioning profiles — they were embedded by xcodebuild archive
          # for the "Apple Development" identity and conflict with the Developer ID re-signing
          find "$APP_PATH" -name "embedded.provisionprofile" -delete -print

          # Embed Developer ID provisioning profiles
          cp Config/profiles/PedalHUD_Developer_ID.provisionprofile "$APP_PATH/Contents/embedded.provisionprofile"
          EXT_PATH=$(find "$APP_PATH" -name "*.systemextension" -type d | head -1)
          if [ -n "$EXT_PATH" ]; then
            cp Config/profiles/PedalHUD_Camera_extension_Developer_ID.provisionprofile "$EXT_PATH/Contents/embedded.provisionprofile"
          fi

          # Sign all standalone executables inside frameworks (e.g., Sparkle's Autoupdate)
          find "$APP_PATH" -type f -perm +111 | while read binary; do
            if file "$binary" | grep -q "Mach-O"; then
              echo "Signing binary: $binary"
              codesign --force --options runtime --timestamp --sign "$IDENTITY" "$binary"
            fi
          done

          # Sign all dylibs
          find "$APP_PATH" -name "*.dylib" | while read lib; do
            echo "Signing dylib: $lib"
            codesign --force --options runtime --timestamp --sign "$IDENTITY" "$lib"
          done

          # Sign all bundles (deepest first): .app, .xpc, .appex, .systemextension, .framework
          find "$APP_PATH" -type d \( -name "*.app" -o -name "*.framework" -o -name "*.systemextension" -o -name "*.xpc" -o -name "*.appex" \) | awk '{print length, $0}' | sort -rn | cut -d' ' -f2- | while read component; do
            # Skip the main app itself — we sign it last
            if [ "$component" = "$APP_PATH" ]; then
              continue
            fi

            # Pass the correct entitlements for each bundle type
            ENTITLEMENTS_FLAG=""
            if [[ "$component" == *.systemextension ]]; then
              ENTITLEMENTS_FLAG="--entitlements $EXT_ENTITLEMENTS"
            fi

            echo "Signing bundle: $component"
            codesign --force --options runtime --timestamp --sign "$IDENTITY" $ENTITLEMENTS_FLAG "$component"
          done

          # Sign the main app last — with its entitlements to preserve sandbox, camera, bluetooth, system-extension.install
          echo "Signing main app: $APP_PATH"
          codesign --force --options runtime --timestamp --sign "$IDENTITY" --entitlements "$MAIN_ENTITLEMENTS" "$APP_PATH"

          echo "Verifying signature..."
          codesign --verify --deep --strict "$APP_PATH"

          # Dump entitlements to confirm they're embedded
          echo "Main app entitlements:"
          codesign -d --entitlements :- "$APP_PATH"

          ZIP_NAME="PedalHUD-${{ steps.version.outputs.version }}.zip"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_NAME"

          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          SUBMISSION=$(xcrun notarytool submit "${{ steps.prepare.outputs.zip_name }}" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --output-format json)

          echo "$SUBMISSION"
          STATUS=$(echo "$SUBMISSION" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          SUBMISSION_ID=$(echo "$SUBMISSION" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")

          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization failed with status: $STATUS"
            echo "Fetching notarization log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              notarization-log.json
            cat notarization-log.json
            exit 1
          fi

          # Staple the notarization ticket to the app
          xcrun stapler staple "${{ steps.prepare.outputs.app_path }}"

          # Re-create the ZIP after stapling
          rm "${{ steps.prepare.outputs.zip_name }}"
          ditto -c -k --keepParent "${{ steps.prepare.outputs.app_path }}" "${{ steps.prepare.outputs.zip_name }}"

      - name: Create DMG
        id: dmg
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_NAME="PedalHUD-${VERSION}.dmg"

          mkdir -p dmg_staging
          cp -R "${{ steps.prepare.outputs.app_path }}" dmg_staging/
          ln -s /Applications dmg_staging/Applications

          hdiutil create -volname "PedalHUD" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            "$DMG_NAME"

          rm -rf dmg_staging
          echo "dmg_name=$DMG_NAME" >> "$GITHUB_OUTPUT"

      - name: Sign update with Sparkle EdDSA key
        id: sparkle_sign
        env:
          SPARKLE_EDDSA_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        run: |
          # Find Sparkle's sign_update tool from build artifacts
          SIGN_UPDATE=$(find .build -name "sign_update" -type f | head -1)

          if [ -z "$SIGN_UPDATE" ]; then
            echo "sign_update not found in build artifacts, downloading Sparkle tools..."
            SPARKLE_TAG=$(curl -sI "https://github.com/sparkle-project/Sparkle/releases/latest" | grep -i "^location:" | sed 's/.*tag\///' | tr -d '\r\n')
            echo "Latest Sparkle: $SPARKLE_TAG"
            curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_TAG}/Sparkle-${SPARKLE_TAG#v}.tar.xz" -o /tmp/sparkle.tar.xz
            mkdir -p /tmp/sparkle && tar xJ -C /tmp/sparkle -f /tmp/sparkle.tar.xz
            SIGN_UPDATE=$(find /tmp/sparkle -name "sign_update" -type f | head -1)
          fi

          # Sign the update archive
          SIGNATURE=$("$SIGN_UPDATE" "${{ steps.prepare.outputs.zip_name }}" --ed-key-file <(echo "$SPARKLE_EDDSA_KEY"))
          echo "signature=$SIGNATURE" >> "$GITHUB_OUTPUT"
          echo "Sparkle signature: $SIGNATURE"

      - name: Generate appcast
        env:
          SPARKLE_SIGNATURE: ${{ steps.sparkle_sign.outputs.signature }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD="${{ steps.version.outputs.build }}"
          ZIP_NAME="${{ steps.prepare.outputs.zip_name }}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/${ZIP_NAME}"
          PUB_DATE=$(date -R)

          python3 -c "
          import sys
          xml = '''<?xml version=\"1.0\" encoding=\"utf-8\"?>
          <rss version=\"2.0\" xmlns:sparkle=\"http://www.andymatuschak.org/xml-namespaces/sparkle\" xmlns:dc=\"http://purl.org/dc/elements/1.1/\">
            <channel>
              <title>PedalHUD</title>
              <link>https://github.com/davidmokos/PedalHUD/releases</link>
              <description>Most recent changes with links to updates.</description>
              <language>en</language>
              <item>
                <title>Version {version}</title>
                <pubDate>{pub_date}</pubDate>
                <sparkle:version>{build}</sparkle:version>
                <sparkle:shortVersionString>{version}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
                <enclosure
                  url=\"{download_url}\"
                  {signature}
                  type=\"application/octet-stream\"
                />
              </item>
            </channel>
          </rss>'''
          print(xml.format(
              version='$VERSION',
              build='$BUILD',
              pub_date='$PUB_DATE',
              download_url='$DOWNLOAD_URL',
              signature='$SPARKLE_SIGNATURE'
          ))
          " > appcast.xml

          echo "Generated appcast.xml:"
          cat appcast.xml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PedalHUD v${{ steps.version.outputs.version }}"
          body: |
            ## PedalHUD v${{ steps.version.outputs.version }}

            ### Installation
            1. Download **`${{ steps.dmg.outputs.dmg_name }}`**
            2. Open the DMG and drag **PedalHUD.app** to your Applications folder
            3. Future updates will be delivered automatically via Sparkle

            ---
            _Built from ${{ github.sha }}_
          files: |
            ${{ steps.dmg.outputs.dmg_name }}
            ${{ steps.prepare.outputs.zip_name }}
            appcast.xml
          draft: false
          prerelease: false

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
